#
# This file describes integration tests for Jupyter Notebooks.
#
# There are top-level test groups.
#
# * Each test group may contain "jobs" or nested children "groups".
# * Each group may define attribute defaults for the contained jobs,
#   e.g. "runner".
# * Each nested group and each job can overide one or multiple of these
#   attributes.
#
#
# In the following example:
# * the job for file test_a.py defines a custom name
# * the job for file test_b.py overrides the group's default runner R1 by R2.
#
# top-level-group-a1:
#   runner: R1
#   jobs:
#     - file: test_a.py
#       name: "Special Name"
#     - file: test_b.py
#       runner: R2

generic:
  runner: ubuntu-24.04
  pytest_params: '--itde-nameserver 8.8.8.8'
  groups:
    - backend: onprem
      require_success: true
      jobs:
        - file: test_first_steps.py
        - file: test_sklearn.py
        - file: test_pyexasol.py
        - file: test_jupysql.py
        - file: test_ibis.py
        - file: test_script_languages_container.py
        - file: test_useful_urls.py
        - file: test_cloud.py
        - file: test_transformers.py
        - file: test_text_ai.py
          runner: int-linux-x64-4core-ubuntu24.04-1
    - backend: saas
      require_success: false
      jobs:
        - file: test_cloud.py
        - file: test_script_languages_container.py
        - file: test_sklearn.py
        - file: test_ibis.py
        - file: test_transformers.py
        - file: test_text_ai.py

gpu:
  runner: int-linux-x64-4core-gpu-t4-ubuntu24.04-1
  pytest_params: '--itde-nameserver 8.8.8.8'
  require_success: true
  backend: onprem
  jobs:
  - file: test_gpu.py
