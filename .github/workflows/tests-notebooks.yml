name: Notebook Tests

on:
  workflow_call:
    inputs:
      selector:
        description: Selector which tests to include, e.g. notebooks-generic
        required: true
        type: string

jobs:

  fetch-notebook-tests:
    runs-on: ubuntu-24.04
    name: Creating Test Matrix for Selector "${{ inputs.selector }}"
    steps:
      - name: SCM Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python & Poetry Environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v8
        with:
          poetry-version: "2.3.0"

      - id: matrix
        run: |
          JOBS=$(poetry run -- nox -s get-notebook-tests -- ${{ inputs.selector }})
          echo "jobs=$JOBS" >> "$GITHUB_OUTPUT"

    outputs:
      jobs: ${{ steps.matrix.outputs.jobs }}

  notebook-tests:
    name: >
      ${{ matrix.el.name }} (${{ matrix.el.backend
      }}${{ case(matrix.el.require_success, '', ', optional') }})
    needs: fetch-notebook-tests
    runs-on: ${{ matrix.el.runner }}
    permissions:
      contents: read
    continue-on-error: ${{ ! matrix.el.require_success }}
    strategy:
      fail-fast: false
      matrix:
        el: ${{ fromJson(needs.fetch-notebook-tests.outputs.jobs) }}

    steps:
      - name: SCM Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: false
          haskell: true

      - name: Free disk space by removing large directories
        run: |
          sudo rm -rf /usr/local/graalvm/
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/lib/node_modules

      - name: Setup Python & Poetry Environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v8
        with:
          poetry-version: "2.3.0"

      - name: Install All Optional Dependencies (aka. "extras")
        run: poetry install --all-extras

      - name: Allow unprivileged user namespaces
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - id: test
        name: Run Pytest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SAAS_HOST: ${{ secrets.INTEGRATION_TEAM_SAAS_STAGING_HOST }}
          SAAS_ACCOUNT_ID: ${{ secrets.INTEGRATION_TEAM_SAAS_STAGING_ACCOUNT_ID }}
          SAAS_PAT: ${{ secrets.INTEGRATION_TEAM_SAAS_STAGING_PAT }}
          NBTEST_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          NBTEST_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          NBTEST_AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          NBTEST_USE_GPU: ${{ inputs.test-classification == 'gpu' && 'true' || 'false' }}
        run: |
          poetry run -- pytest -rA --setup-show \
            --backend=${{ matrix.el.backend }} \
            ${{ matrix.el.pytest_params }} \
            test/notebooks/${{ matrix.el.file }}

      - name: Save Result
        if: always()
        run: |
          mkdir -p results
          jq -n '{
            file: "${{ matrix.el.file }}",
            require_success: ${{ matrix.el.require_success }},
            backend: "${{ matrix.el.backend }}",
            runner: "${{ matrix.el.runner }}",
            outcome: "${{ steps.test.outcome }}"
          }' > results/${{ matrix.el.file }}.json

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-result-${{ matrix.el.file }}
          path: results/${{ matrix.el.file }}.json

  evaluate-tests:
    name: Evaluate Test Results
    runs-on: ubuntu-24.04
    if: always()
    needs: notebook-tests
    steps:
      - name: SCM Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python & Poetry Environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v8
        with:
          poetry-version: "2.3.0"
      
      - name: Download Test Results
        uses: actions/download-artifact@v8
        with:
          pattern: test-result-*
          path: results
          merge-multiple: true

      - name: Verify Success of Mandatory Tests
        run: poetry run -- nox -s test:notebooks:evaluate-results -- results/*.json
