name: Notebook Tests

on:
  workflow_call:
    inputs:
      status-filter:
        description: 'Only nb tests with the given status will be executed (stable or unstable).'
        required: true
        type: string
      test-classification:
        description: 'Test classification: normal, large or gpu'
        required: true
        type: string

jobs:

  fetch-notebook-tests2:
    runs-on: ubuntu-24.04
    name: Creating test matrix for selector "selector"
    steps:
      - id: matrix
        run: |
          TESTS=$(
            echo -n '['
            echo -n '{"label": "N1", "file": "test_n1.py", "backend": "onprem", "require-success": true }, '
            echo -n '{"label": "N2", "file": "test_n2.py", "backend": "onprem", "require-success": true }'
            echo -n ']'
          )
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"

    outputs:
      runner: "ubuntu-24.04"
      pytest_params: "x"
      tests: ${{ steps.matrix.outputs.tests }}

  fetch-notebook-tests:
    if: false
    runs-on: ubuntu-24.04
    name: Fetching ${{ inputs.status-filter }} ${{ inputs.test-classification }} notebook tests
    steps:
      - id: set-tests
        run: |
          TESTS='{"tests":[' # ]
          TESTS="$TESTS"'{"name":"Notebook N1","test_file":"test_n1.py","test_backend":"onprem"},'
          TESTS="$TESTS"'{"name":"Notebook N2","test_file":"test_n2.py","test_backend":"onprem"}'
          TESTS="$TESTS"']}'
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"

    outputs:
      tests: ${{ steps.set-tests.outputs.tests }}
      runner: "ubuntu-24.04"
      pytest_params: "xx"

