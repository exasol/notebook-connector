  notebook-tests2:
    name: XXX ${{ matrix.nb_test.label }} (${{ matrix.nb_test.backend }})
    needs: fetch-notebook-tests2
    runs-on: ${{ needs.fetch-notebook-tests2.outputs.runner }}
    permissions:
      contents: read
    continue-on-error: ${{ inputs.status-filter == 'unstable' }}
    strategy:
      fail-fast: false
      matrix:
        nb_test: ${{ fromJson(needs.fetch-notebook-tests2.outputs.tests) }}
    steps:
      - name: Sample
        run: echo --backend=${{ matrix.nb_test.backend }} \
            ${{ needs.fetch-notebook-tests2.outputs.pytest_params }} \
            test/notebooks/${{ matrix.nb_test.file }}

  notebook-tests:
    name: ${{ matrix.nb_test.name }} (${{ matrix.nb_test.test_backend }})
    if: false
    # if: ${{ fromJson(needs.fetch-notebook-tests.outputs.tests).tests }}
    needs: fetch-notebook-tests
    runs-on: ${{ needs.fetch-notebook-tests.outputs.runner }}
    permissions:
      contents: read
    continue-on-error: ${{ inputs.status-filter == 'unstable' }}
    # Causes errors if build matrix is empty, see
    # https://github.com/exasol/notebook-connector/issues/432
    strategy:
      fail-fast: false
      matrix:
        nb_test: ${{ fromJson(needs.fetch-notebook-tests.outputs.tests).tests }}

    steps:
      - name: Sample
        run: echo --backend=${{ matrix.nb_test.test_backend }} \
            ${{ needs.fetch-notebook-tests.outputs.pytest_params }} \
            test/notebooks/${{ matrix.nb_test.test_file }}

      - name: Simulate pytest failure
        if: ${{ inputs.test-classification }} == "unstable"
        run: |
          echo simulating test failure
          exit 1

      - name: Save result
        if: always()
        run: |
          mkdir -p results
          jq -n \
            --arg notebook "${{ matrix.notebook }}" \
            --arg stability "${{ inputs.test-classification }}" \
            --arg outcome "${{ steps.test.outcome }}" \
            '{
              notebook: $notebook,
              stability: $stability,
              outcome: $outcome
            }' \
            > results/${{ matrix.notebook }}.json
