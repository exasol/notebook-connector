name: Notebook Tests

on:
  workflow_call:
    inputs:
      status-filter:
        description: 'Only nb tests with the given status will be executed (stable or unstable).'
        required: true
        type: string
      test-classification:
        description: 'Test classification: normal, large or gpu'
        required: true
        type: string

jobs:

  fetch-notebook-tests:
    runs-on: ubuntu-24.04
    name: Creating test matrix for selector "selector"
    steps:
      - id: matrix
        run: |
          TESTS=$(jq -cn '[
            {label: "N1", "file": "test_n1.py", backend: "onprem", runner: "ubuntu-24.04", pytest_params: "", require_success: true },
            {label: "N2", "file": "test_n2.py", backend: "onprem", runner: "ubuntu-22.04", pytest_params: "", require_success: false }
            ]'
          )
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"

    outputs:
      pytest_params: "x"
      tests: ${{ steps.matrix.outputs.tests }}

  notebook-tests:
    name: ${{ matrix.el.label }} (${{ matrix.el.backend }})
    needs: fetch-notebook-tests
    # runs-on: ${{ needs.fetch-notebook-tests.outputs.runner }}
    runs-on: ${{ matrix.el.runner }}
    permissions:
      contents: read
    continue-on-error: ${{ inputs.status-filter == 'unstable' }}
    strategy:
      fail-fast: false
      matrix:
        el: ${{ fromJson(needs.fetch-notebook-tests.outputs.tests) }}
    steps:
      - name: Sample
        run: echo --backend=${{ matrix.el.backend }} \
            ${{ matrix.el.pytest_params }} \
            test/notebooks/${{ matrix.el.file }}

      - id: test
        name: Simulate pytest failure
        if: ${{ ! matrix.el.require_success }}
        # if: ${{ matrix.require_success && steps.test.outcome != 'success' }}
        run: |
          echo simulating test failure
          exit 1

      - name: Save Result
        if: always()
        run: |
          mkdir -p results
          echo calling jq -n...
          jq -n '{
            file: "${{ matrix.el.file }}",
            require_success: "${{ matrix.el.require_success }}",
            outcome: "${{ steps.test.outcome }}"
          }'
          jq -n \
            --arg file "${{ matrix.el.file }}" \
            --arg require_success "${{ matrix.el.require_success }}" \
            --arg outcome "${{ steps.test.outcome }}" \
            '{
              file: $file,
              require_success: $require_success,
              outcome: $outcome
            }' > results/${{ matrix.el.file }}.json

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-result-${{ matrix.el.file }}
          path: results/${{ matrix.el.file }}.json

  # evaluate-tests:
  #   name: Evaluate ${{}}
  #   if: always()
  #   needs: notebook-tests

