name: Slow-Checks

on:
  workflow_call:

jobs:

  ordinary-itests:
    name: Ordinary iTests
    uses: ./.github/workflows/tests-ordinary-integration.yml
    permissions:
      contents: read

  large-runner-tests:
    name: Large Runner
    uses: ./.github/workflows/tests-large-runner.yml
    permissions:
      contents: read

  gpu-tests:
    name: GPU
    uses: ./.github/workflows/tests-gpu.yml
    permissions:
      contents: read

  ui-tests:
    name: UI
    uses: ./.github/workflows/tests-ui.yml
    permissions:
      contents: read

  notebook-tests:
    name: Notebook Tests
    uses: ./.github/workflows/tests-notebooks.yml
    secrets: inherit
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        class: [normal, large]
    with:
      status-filter: stable
      test-classification: ${{ matrix.class }}

  notebook-tests-unstable:
    name: Notebook Tests (unstable)
    uses: ./.github/workflows/tests-notebooks.yml
    secrets: inherit
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        class: [normal, large]
    with:
      status-filter: unstable
      test-classification: ${{ matrix.class }}